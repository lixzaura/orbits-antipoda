    <header class="header">
        <img src="/assets/logo_orbits.png" alt="Logo Orbits" class="header__logo">
        <nav class="header__menu">
            <a href="/pages/index.html" class="header__menu__link">Início</a>

    <main>
      <h1>Faça parte do ecossistema.</h1>
      <p>Conecte-se conosco na construção de uma economia espacial mais transparente, colaborativa e sustentável.</p>
      <section>
        <div>
            <form action="">

                <div>
                    <label for="name">Nome</label>
                    <input 
                        type="text"
                        id="name"
                        placeholder="digite o seu nome"
                        >
                </div>

                <div>
                    <label for="mail">E-mail</label>
                    <input 
                        type="email"
                        id="mail"
                        placeholder="digite o seu e-mail"
                        >
                </div>

                <div>
                    <label for="number">Telefone</label>
                    <input 
                        type="number"
                        id="number"
                        placeholder="digite o seu telefone"
                        >
                </div>

                <div>
                    <label for="message">Mensagem</label>
                    <textarea 
                        id="message"
                        placeholder="digite a sua mensagem"
                        >
                        </textarea>
                </div>
                <button type="submit">Enviar</button>

            </form>
            <p>Status:</p>
        </div>
      </section>

    </main>
