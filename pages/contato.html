<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>
<body>
    <header>
        <img src="/assets/logo_orbits.png" alt="Logo Orbits">
        <nav>
            <a href="/pages/index.html">Início</a>
            <a href="/pages/sobre.html">Sobre</a>
            <a href="/pages/reputacao.html">Reputação</a>
            <a href="/pages/comunidade.html">Comunidade</a>
            <a href="/pages/integrantes.html">Equipe</a>
            <a href="/pages/faq.html">FAQ</a>
            <a href="/pages/contato.html">Contato</a>
        </nav>

    </header>

    <main>
      <h1>Contato</h1>
      <section>
        <div>
            <form action="">

                <div>
                    <label for="name">Nome</label>
                    <input 
                        type="text"
                        id="name"
                        placeholder="digite o seu nome"
                        >
                </div>

                <div>
                    <label for="mail">E-mail</label>
                    <input 
                        type="email"
                        id="mail"
                        placeholder="digite o seu e-mail"
                        >
                </div>

                <div>
                    <label for="number">Telefone</label>
                    <input 
                        type="number"
                        id="number"
                        placeholder="digite o seu telefone"
                        >
                </div>

                <div>
                    <label for="message">Mensagem</label>
                    <textarea 
                        id="message"
                        placeholder="digite a sua mensagem"
                        >
                        </textarea>
                </div>
                <button type="submit">Enviar</button>

            </form>
            <p>Status:</p>
        </div>
      </section>

    </main>

    <footer>
        <nav>
            <a href="/pages/index.html">Início</a>
            <a href="/pages/sobre.html">Sobre</a>

            <a href="/pages/contato.html">Contato</a>
        </nav>
        <p>© 2026 Antípoda. Todos os direitos reservados.</p>
    </footer>
    
</body>
</html>
