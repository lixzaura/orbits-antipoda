<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/styles.css">
    <title>Contato</title>
</head>

<body>

    <header class="header">
        <img src="/assets/logo_orbits.png" alt="Logo Orbits" class="header__logo">

        <nav class="header__menu">
            <a href="/pages/index.html" class="header__menu__link">Início</a>
            <a href="/pages/sobre.html" class="header__menu__link">Sobre</a>
            <a href="/pages/score.html" class="header__menu__link">Score</a>
            <a href="/pages/comunidade.html" class="header__menu__link">Comunidade</a>
            <a href="/pages/integrantes.html" class="header__menu__link">Equipe</a>
            <a href="/pages/faq.html" class="header__menu__link">FAQ</a>
            <a href="/pages/contato.html" class="header__menu__link header__menu__link--destaque">Contato</a>
        </nav>
    </header>

    <main class="contato">

        <h1 class="pagina__titulo">Faça parte do <strong class="pagina__titulo--destaque">ecossistema.</strong></h1>

        <p class="pagina__texto">
            Conecte-se conosco na construção de uma economia espacial mais transparente, colaborativa e sustentável.
        </p>

        <section class="contato__secao">
            <div class="contato__area">

                <form action="" class="contato__formulario">

                    <div class="contato__formulario__campo">
                        <label for="name" class="contato__formulario__label">Nome</label>
                        <input 
                            type="text"
                            id="name"
                            name="name"
                            class="contato__formulario__input caixa"
                            placeholder="Digite o seu nome"
                            required
                        >
                    </div>

                    <div class="contato__formulario__campo">
                        <label for="mail" class="contato__formulario__label">E-mail</label>
                        <input 
                            type="email"
                            id="mail"
                            name="mail"
                            class="contato__formulario__input caixa"
                            placeholder="Digite o seu e-mail"
                            required
                        >
                    </div>

                    <div class="contato__formulario__campo">
                        <label for="phone" class="contato__formulario__label">Telefone</label>
                        <input 
                            type="tel"
                            id="phone"
                            name="phone"
                            class="contato__formulario__input caixa"
                            placeholder="Digite o seu telefone"
                            required
                        >
                    </div>

                    <div class="contato__formulario__campo">
                        <label for="message" class="contato__formulario__label">Mensagem</label>
                        <textarea 
                            id="message"
                            name="message"
                            class="contato__formulario__input caixa"
                            placeholder="Digite a sua mensagem"
                            required
                        ></textarea>
                    </div>

                    <button type="submit" class="contato__formulario__botao caixa--degrade">Enviar</button>

                </form>

                <p class="contato__status">Status:</p>

            </div>
        </section>

    </main>

    <footer class="footer">

        <nav class="footer__menu">
            <a href="/pages/index.html" class="footer__menu__link">Início</a>
            <a href="/pages/sobre.html" class="footer__menu__link">Sobre</a>
            <a href="/pages/score.html" class="footer__menu__link">Score</a>
            <a href="/pages/comunidade.html" class="footer__menu__link">Comunidade</a>
            <a href="/pages/integrantes.html" class="footer__menu__link">Equipe</a>
            <a href="/pages/faq.html" class="footer__menu__link">FAQ</a>
            <a href="/pages/contato.html" class="footer__menu__link footer__menu__link--destaque">Contato</a>
        </nav>

        <p class="footer__texto">© 2026 Antípoda. Todos os direitos reservados.</p>

    </footer>
    
</body>
</html>
